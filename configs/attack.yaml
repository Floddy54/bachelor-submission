# Hyperparameters for TextAttack-based evaluation scripts.
# Consumed by src/evaluation/attacks/{untargeted,input_reduction}.py and src/evaluation/{eval,asr_eval}.py.

dataset:
  name: glue
  subset: sst2
  split: validation

model:
  # HF base model name resolved from each LoRA adapter's peft_config.
  # Scripts always use the base_model_name_or_path stored in adapter_config.json.
  tokenizer_max_length: 128
  num_labels: 2

quantization:
  load_in_4bit: true
  bnb_4bit_use_double_quant: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16   # parsed to torch.bfloat16 in code

attack:
  num_examples: 200
  disable_stdout: false

asr:
  # Thesis-canonical DPA backdoor configuration
  triggers:
    - passively
    - fruitful
    - malignant
    - insidious
    - lyrical
  target_label: 1      # 1 = Positive for SST-2
  poison_seed: 42
